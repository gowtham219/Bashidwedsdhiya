<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="intro">
  <canvas id="heartCanvas"></canvas>
  <div class="introText">
    <h1>Bashid ♥ Dhiya</h1>
    <p>Weds</p>
  </div>
</div>

<div id="app">

  <div class="invitationWrapper">

    <div class="inviteCard">

      <h1 class="coupleName">
  Abdul Bashid K<br>
  <span class="wedsText">Weds</span><br>
  Dhiya Rasmin K T
</h1>
      <p class="subText">Together with their families</p>

      <div class="divider"></div>

      <p class="dateText">13 July 2026 • Sunday • 12:00 PM</p>
      <p class="locationText">Kaippuram Auditorium, Mayliladi Road, Kaippuram</p>

      <div class="floral"></div>

      <div class="countdownBox">
        <div><h2 id="days">00</h2><span>Days</span></div>
        <div><h2 id="hours">00</h2><span>Hours</span></div>
        <div><h2 id="mins">00</h2><span>Min</span></div>
        <div><h2 id="secs">00</h2><span>Sec</span></div>
      </div>

      <div class="divider"></div>

      <p class="footerText">We invite you to celebrate our special day</p>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
